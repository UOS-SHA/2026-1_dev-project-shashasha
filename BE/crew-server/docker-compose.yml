# PostgreSQL을 Docker 컨테이너로 띄우는 설정.
# 실행:  docker compose up -d     (백그라운드 실행)
# 끄기:  docker compose down       (데이터는 아래 volume에 남아있음)
services:
  db:
    image: postgres:16            # PostgreSQL 16 공식 이미지
    container_name: crew-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crew           # 만들 데이터베이스 이름
      POSTGRES_USER: crew         # 접속 계정
      POSTGRES_PASSWORD: crewpass # 로컬 개발용 비번 (운영에선 안 씀)
    ports:
      - "5432:5432"               # 내 PC의 5432 → 컨테이너의 5432 연결
    volumes:
      - crew-db-data:/var/lib/postgresql/data  # 컨테이너 꺼져도 데이터 보존

volumes:
  crew-db-data:
