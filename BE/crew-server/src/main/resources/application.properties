spring.application.name=crew-server

# ── DB 접속 정보 ──────────────────────────────────────────────
# ${ENV_NAME:기본값} 문법: 환경변수가 있으면 그 값, 없으면 뒤의 기본값 사용.
# 로컬에서는 기본값으로 바로 동작하고, 배포 서버에서는 환경변수로 덮어씀.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/crew}
spring.datasource.username=${DB_USERNAME:crew}
spring.datasource.password=${DB_PASSWORD:crewpass}

# ── JPA / Hibernate ──────────────────────────────────────────
# ddl-auto=update : 엔티티(자바 클래스) 모양에 맞춰 테이블을 자동 생성/수정.
#   개발 초기엔 편함. (운영에선 validate 또는 마이그레이션 도구로 바꿈)
spring.jpa.hibernate.ddl-auto=update
# 실행 중 어떤 SQL이 나가는지 콘솔에 보여줌 (공부할 때 큰 도움)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── 서버 포트 ─────────────────────────────────────────────────
# FE의 baseURL이 localhost:8080 이라 8080 유지
server.port=8080

# ── JWT(로그인 토큰) 설정 ─────────────────────────────────────
# secret: 토큰에 서명할 때 쓰는 비밀 열쇠. HS256은 최소 32바이트(256비트) 이상이어야 함.
#         운영 배포 시에는 반드시 JWT_SECRET 환경변수로 길고 무작위한 값으로 덮어쓸 것.
# expiration: 토큰 유효시간(밀리초). 기본 7일(1000*60*60*24*7).
jwt.secret=${JWT_SECRET:dev-only-shashasha-super-secret-key-change-me-please-32+}
jwt.expiration=${JWT_EXPIRATION:604800000}
